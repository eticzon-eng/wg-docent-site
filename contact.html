<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Contact — WG Docent</title>
  <meta name="description" content="Subscribe for release updates from WG Docent, author of Silas and the Wizard.">
  <link rel="icon" href="assets/favicon.png" type="image/png">

</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="/" aria-label="WG Docent home">
        <img src="assets/logo.png" alt="WG Docent">
      </a>
      <div class="header-right">
        <nav class="site-nav" aria-label="Main">
          <a href="/">Home</a>
          <a href="book.html">The Book</a>

      </div>
    </div>

  <main>
    <section class="hero">

        <h1>Release updates</h1>

            src="https://buttondown.com/wgdocent?as_embed=true"

  <footer class="site-footer">
    <div class="footer-inner">
      <nav class="footer-social" id="footer-social" aria-label="Social media"></nav>
    </div>
    <div class="footer-inner">
